site_name: dissmodel-sysdyn Documentation
site_description: Official documentation for the System Dynamics package of dissmodel.
site_author: Sergio

theme:
  name: material
  palette:
    primary: indigo
    accent: light blue
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Models Reference: reference.md
  - Tutorials: models.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
